{% extends "base.html" %}
{% block title %}Edit Student | Admin{% endblock %}
{% block content %}
<div class="container-fluid py-4 px-4">
    <div class="page-header mb-4">
        <h2 class="page-title"><i class="fas fa-user-edit me-2 text-primary"></i>Edit Student</h2>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="alert alert-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}
                    <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label fw-semibold">Full Name</label><input type="text" class="form-control" name="full_name" value="{{ student.full_name }}"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Phone</label><input type="tel" class="form-control" name="phone" value="{{ student.phone or '' }}"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">College</label><input type="text" class="form-control" name="college" value="{{ student.college or '' }}"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Department</label><input type="text" class="form-control" name="department" value="{{ student.department or '' }}"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Year of Study</label><input type="text" class="form-control" name="year_of_study" value="{{ student.year_of_study or '' }}"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">CGPA</label><input type="number" class="form-control" name="cgpa" step="0.01" value="{{ student.cgpa or '' }}"></div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill px-4"><i class="fas fa-save me-2"></i>Update</button>
                            <a href="{{ url_for('admin.students') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
