{% extends "base.html" %}
{% block title %}Add Mentor | Admin{% endblock %}
{% block content %}
<div class="container-fluid py-4 px-4">
    <div class="page-header mb-4"><h2 class="page-title"><i class="fas fa-user-plus me-2 text-success"></i>Add New Mentor</h2></div>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="alert alert-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}
                    <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label fw-semibold">Full Name *</label><input type="text" class="form-control" name="full_name" required></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Username *</label><input type="text" class="form-control" name="username" required></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Email *</label><input type="email" class="form-control" name="email" required></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Phone</label><input type="tel" class="form-control" name="phone"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Password</label><input type="password" class="form-control" name="password" value="Mentor@123"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Designation</label><input type="text" class="form-control" name="designation" placeholder="e.g. Senior Engineer"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Department</label><input type="text" class="form-control" name="department"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Expertise</label><input type="text" class="form-control" name="expertise" placeholder="Python, ML, Web Dev (comma separated)"></div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-success rounded-pill px-4"><i class="fas fa-save me-2"></i>Save Mentor</button>
                            <a href="{{ url_for('admin.mentors') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
