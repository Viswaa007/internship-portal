{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="container py-5 mt-5">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card border-0 shadow-lg rounded-4">

                <!-- Header -->
                <div class="card-header bg-dark text-white p-4 rounded-top-4">
                    <h3 class="mb-0">
                        <i class="fas fa-cog me-2"></i>
                        Account Settings
                    </h3>
                </div>

                <!-- Body -->
                <div class="card-body p-5">

                    <form method="POST" action="{{ url_for('settings.settings') }}" id="settingsForm">

                        <!-- CSRF TOKEN -->
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <!-- Username -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Username
                            </label>

                            <input type="text" name="username" class="form-control form-control-lg rounded-3"
                                value="{{ current_user.username }}" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Email Address
                            </label>

                            <input type="email" name="email" class="form-control form-control-lg rounded-3"
                                value="{{ current_user.email }}" required>
                        </div>

                        <hr class="my-4">

                        <!-- Password Section -->
                        <h5 class="mb-3">
                            Change Password
                        </h5>

                        <!-- Current Password -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Current Password
                            </label>

                            <input type="password" name="current_password"
                                class="form-control form-control-lg rounded-3" placeholder="Enter current password">
                        </div>

                        <!-- New Password -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                New Password
                            </label>

                            <input type="password" name="new_password" class="form-control form-control-lg rounded-3"
                                placeholder="Enter new password">
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Confirm New Password
                            </label>

                            <input type="password" name="confirm_password"
                                class="form-control form-control-lg rounded-3" placeholder="Confirm new password">
                        </div>

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg rounded-3">

                                <i class="fas fa-save me-2"></i>
                                Save Changes
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

<script>

    // Settings Form
    document.getElementById("settingsForm")
        .addEventListener("submit", function () {

            // Password Fields
            const currentPassword =
                document.querySelector('input[name="current_password"]').value;

            const newPassword =
                document.querySelector('input[name="new_password"]').value;

            const confirmPassword =
                document.querySelector('input[name="confirm_password"]').value;

            // Password Changed
            if (
                currentPassword !== "" &&
                newPassword !== "" &&
                confirmPassword !== ""
            ) {

                // Notification
                addNotification(
                    "Password changed successfully",
                    "fa-key",
                    "warning"
                );

            }

        });

</script>

{% endblock %}
