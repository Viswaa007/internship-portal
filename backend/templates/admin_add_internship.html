{% extends "base.html" %}
{% block title %}Create Internship | Admin{% endblock %}
{% block content %}
<div class="container-fluid py-4 px-4">
    <div class="page-header mb-4"><h2 class="page-title"><i class="fas fa-plus me-2 text-warning"></i>Create Internship</h2></div>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="alert alert-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}
                    <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="row g-3">
                            <div class="col-12"><label class="form-label fw-semibold">Internship Title *</label><input type="text" class="form-control" name="title" required placeholder="e.g. Machine Learning Internship"></div>
                            <div class="col-12"><label class="form-label fw-semibold">Description</label><textarea class="form-control" name="description" rows="3" placeholder="Describe the internship program..."></textarea></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Domain</label><input type="text" class="form-control" name="domain" placeholder="e.g. AI/ML, Web Dev, Data Science"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Assign Mentor</label>
                                <select class="form-select" name="mentor_id">
                                    <option value="">— No Mentor —</option>
                                    {% for mentor in mentors %}<option value="{{ mentor.id }}">{{ mentor.full_name }} — {{ mentor.designation }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="col-12"><label class="form-label fw-semibold">Required Skills (comma separated)</label><input type="text" class="form-control" name="required_skills" placeholder="Python, Flask, MySQL, Machine Learning"></div>
                            <div class="col-md-4"><label class="form-label fw-semibold">Duration (weeks)</label><input type="number" class="form-control" name="duration_weeks" min="1" value="8"></div>
                            <div class="col-md-4"><label class="form-label fw-semibold">Max Students</label><input type="number" class="form-control" name="max_students" min="1" value="10"></div>
                            <div class="col-md-4"><label class="form-label fw-semibold">Status</label><select class="form-select" name="status"><option value="open">Open</option><option value="closed">Closed</option></select></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Start Date</label><input type="date" class="form-control" name="start_date"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">End Date</label><input type="date" class="form-control" name="end_date"></div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-warning text-dark rounded-pill px-4"><i class="fas fa-save me-2"></i>Create Internship</button>
                            <a href="{{ url_for('admin.internships') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
